<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Studio — Infinite Open Core</title>
    <style>
        :root {
            --accent-blue: #0A84FF;
            --text-main: #FFFFFF;
            --text-muted: #8E8E93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0;
            padding: 24px;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            background-color: #000000;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225,39%,25%,0.5) 0, transparent 70%),
                radial-gradient(at 100% 100%, hsla(225,39%,12%,1) 0, transparent 100%);
            background-attachment: fixed;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
        }

        .brand h1 {
            font-size: 22px;
            font-weight: 700;
            margin: 0;
            color: var(--text-main);
        }

        .tunnel-badge {
            background: rgba(48, 209, 88, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(48, 209, 88, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #30D158;
        }

        .app-layout {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 20px;
            flex-grow: 1;
            height: calc(100vh - 80px);
            min-height: 0;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        #chat-scroller {
            flex-grow: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .bubble {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 20px;
            line-height: 1.5;
            font-size: 15px;
            animation: iOSPop 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .bubble.user {
            background: var(--accent-blue);
            color: #FFFFFF;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .bubble.ai {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-bar {
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            align-items: center;
        }

        .input-bar input[type="text"] {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 16px;
            border-radius: 20px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
        }

        .send-btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
        }

        .workspace-tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.15);
            padding: 6px;
            gap: 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tab {
            flex: 1;
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
        }

        .tab.active {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.1);
        }

        .tab-panel {
            padding: 20px;
            flex-grow: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .tab-panel.active { display: flex; }

        textarea {
            width: 100%;
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            color: var(--text-main);
            padding: 16px;
            resize: none;
            outline: none;
            box-sizing: border-box;
        }

        #canvas {
            background: #FFFFFF;
            border-radius: 16px;
            cursor: crosshair;
            flex-grow: 1;
        }

        @keyframes iOSPop {
            from { opacity: 0; transform: scale(0.96) translateY(4px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <h1>Nexus Studio <span>G4F Core</span></h1>
    </div>
    <div class="tunnel-badge">
        🟢 Direct G4F Route Active
    </div>
</header>

<div class="app-layout">
    <div class="glass-panel">
        <div id="chat-scroller">
            <div class="bubble ai">G4F proxy channel open. Completely un-throttled text interactions are active with no popup interruptions. Type a prompt below to begin your session.</div>
        </div>
        <div class="input-bar">
            <input type="text" id="chat-input" placeholder="Message your Socratic coach..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendChatMessage()">Send</button>
        </div>
    </div>

    <div class="glass-panel">
        <div class="workspace-tabs">
            <button class="tab active" onclick="toggleWorkspace('board')">Studio Canvas</button>
            <button class="tab" onclick="toggleWorkspace('materials')">Context Engine</button>
        </div>

        <div id="board" class="tab-panel active">
            <canvas id="canvas"></canvas>
            <div style="margin-top: 12px; display: flex; justify-content: flex-end;">
                <button onclick="clearStudioCanvas()" style="background: #FF453A; color: white; padding: 8px 16px; border-radius: 18px; border:none; cursor:pointer; font-weight:600; font-size:13px;">Clear</button>
            </div>
        </div>

        <div id="materials" class="tab-panel">
            <textarea id="knowledge-data" placeholder="Paste assignments, source materials, study notes, or rubric sheets here to focus the AI's logic..."></textarea>
        </div>
    </div>
</div>

<script>
    const SOCRATIC_PROMPT = `You are an elite, patient Socratic tutor. Never give direct solutions. Evaluate user input, isolate where structural knowledge fails, and ask ONE targeted guiding question to step them toward the answer. Keep replies brief.`;
    
    let conversationHistory = [];

    window.handleKeyPress = (e) => { if(e.key === 'Enter') sendChatMessage(); };

    async function sendChatMessage() {
        const inputField = document.getElementById('chat-input');
        const userText = inputField.value.trim();
        if(!userText) return;

        const scroller = document.getElementById('chat-scroller');
        scroller.innerHTML += `<div class="bubble user">${userText}</div>`;
        inputField.value = '';
        scroller.scrollTop = scroller.scrollHeight;

        const contextMaterial = document.getElementById('knowledge-data').value.trim();
        const finalSystemInstruction = contextMaterial ? `${SOCRATIC_PROMPT}\n\nSTRICT CONTEXT:\n${contextMaterial}` : SOCRATIC_PROMPT;

        const aiBubbleId = 'ai-' + Date.now();
        scroller.innerHTML += `<div class="bubble ai" id="${aiBubbleId}">Routing through open pipeline...</div>`;
        scroller.scrollTop = scroller.scrollHeight;

        // Formulating standard OpenAI-compatible message structure arrays for the downstream endpoint
        conversationHistory.push({ role: "user", content: userText });
        
        const payloadMessages = [
            { role: "system", content: finalSystemInstruction },
            ...conversationHistory.slice(-6) // Keeps context fluid while protecting local memory boundaries
        ];

        try {
            // Re-routing directly to a high-capacity, keyless open public inference node
            const response = await fetch('https://open-ai-api-production.up.railway.app/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    model: 'gemini-2.5-flash',
                    messages: payloadMessages,
                    temperature: 0.3
                })
            });

            const data = await response.json();
            const reply = data.choices[0].message.content;

            document.getElementById(aiBubbleId).innerText = reply;
            conversationHistory.push({ role: "assistant", content: reply });
        } catch (err) {
            document.getElementById(aiBubbleId).innerText = "The open route is congested. Sending retry packet link...";
            console.error(err);
            // Auto-fallback backup if proxy route fluctuates
            setTimeout(sendChatMessage, 1000);
        }
        scroller.scrollTop = scroller.scrollHeight;
    }

    window.toggleWorkspace = function(panelId) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(panelId).classList.add('active');
        event.target.classList.add('active');
    }

    let canvas, ctx, drawing = false;
    function initCanvas() {
        canvas = document.getElementById("canvas");
        ctx = canvas.getContext("2d");
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight - 80;
        ctx.strokeStyle = "#1C1C1E";
        ctx.lineWidth = 4;
        ctx.lineCap = "round";

        canvas.onmousedown = () => drawing = true;
        canvas.onmouseup = () => { drawing = false; ctx.beginPath(); };
        canvas.onmousemove = (e) => {
            if(!drawing) return;
            const bounds = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - bounds.left, e.clientY - bounds.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.clientX - bounds.left, e.clientY - bounds.top);
        }
    }
    window.clearStudioCanvas = () => ctx.clearRect(0, 0, canvas.width, canvas.height);

    setTimeout(initCanvas, 500);
</script>
</body>
</html>
