<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Premium — iOS Glassmorphism Edition</title>
    <style>
        :root {
            --accent-blue: #0A84FF; /* iOS Premium Blue */
            --text-main: #FFFFFF;
            --text-muted: #8E8E93; /* iOS Muted Gray */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 24px;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            background-color: #000000;
            /* Apple-style colorful abstract gradient mesh running in the background */
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.6) 0, transparent 70%),
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.5) 0, transparent 50%),
                radial-gradient(at 100% 100%, hsla(225,39%,12%,1) 0, transparent 100%);
            background-attachment: fixed;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            margin-bottom: 16px;
        }

        .brand h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 0;
            color: var(--text-main);
        }

        #status-container {
            /* Frosted glass effect */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 14px;
            margin-bottom: 20px;
            font-size: 14px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        #progress-bar {
            width: 0%;
            height: 3px;
            background: var(--accent-blue);
            border-radius: 2px;
            margin-top: 8px;
            transition: width 0.3s;
        }

        .app-layout {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 20px;
            flex-grow: 1;
            height: calc(100vh - 150px);
            min-height: 0;
        }

        /* iOS Translucent Glass Panel Wrapper */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        #chat-scroller {
            flex-grow: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Message Bubbles configured to look like iOS iMessage / Messages layout */
        .bubble {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 20px;
            line-height: 1.5;
            font-size: 15px;
            animation: iOSPop 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .bubble.user {
            background: var(--accent-blue);
            color: #FFFFFF;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .bubble.ai {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-bar {
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            gap: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            align-items: center;
        }

        .input-bar input {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 16px;
            border-radius: 20px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: background 0.2s;
        }

        .input-bar input:focus {
            background: rgba(255, 255, 255, 0.12);
        }

        .input-bar button {
            background: var(--accent-blue);
            color: #FFFFFF;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        /* iOS Tab Bar navigation subcomponents */
        .workspace-tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.15);
            padding: 6px;
            gap: 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tab {
            flex: 1;
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .tab.active {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.1);
        }

        .tab-panel {
            padding: 20px;
            flex-grow: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .tab-panel.active { display: flex; }

        textarea {
            width: 100%;
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            color: var(--text-main);
            padding: 16px;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
            box-sizing: border-box;
        }

        #canvas {
            background: #FFFFFF;
            border-radius: 16px;
            cursor: crosshair;
            flex-grow: 1;
        }

        /* Native fluid iOS pop scaling animation */
        @keyframes iOSPop {
            from { opacity: 0; transform: scale(0.96) translateY(4px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <h1>Nexus Studio</h1>
    </div>
</header>

<div id="status-container">
    <span id="status-text">Connecting to iOS WebGPU Graphics Framework...</span>
    <div style="background: rgba(255,255,255,0.05); border-radius: 2px;">
        <div id="progress-bar"></div>
    </div>
</div>

<div class="app-layout">
    <div class="glass-panel">
        <div id="chat-scroller"></div>
        <div class="input-bar">
            <input type="text" id="chat-input" placeholder="Booting local interface components..." disabled onkeypress="handleKeyPress(event)">
            <button id="submit-btn" onclick="sendChatMessage()" disabled>Send</button>
        </div>
    </div>

    <div class="glass-panel">
        <div class="workspace-tabs">
            <button class="tab active" onclick="toggleWorkspace('materials')">Context Engine</button>
            <button class="tab" onclick="toggleWorkspace('board')">Studio Canvas</button>
        </div>

        <div id="materials" class="tab-panel active">
            <textarea id="knowledge-data" placeholder="Paste assignments, course notes, structures or syllabus data guidelines here..."></textarea>
        </div>

        <div id="board" class="tab-panel">
            <canvas id="canvas"></canvas>
            <div style="margin-top: 12px; display: flex; justify-content: flex-end;">
                <button onclick="clearStudioCanvas()" style="background: #FF453A; color: white; padding: 8px 16px; border-radius: 18px; border:none; cursor:pointer; font-weight:600; font-size:13px;">Clear Canvas</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

    const BASE_INSTRUCTION = `You are an elite, patient Socratic tutor. My goal is to truly learn. Never give me the direct solution to a problem or write code/essays for me. Instead, evaluate my input, isolate where my structural knowledge fails, and challenge me with ONE targeted guiding question at a time. Keep replies brief.`;
    
    let engine;
    let conversationHistory = [];

    async function initializeSystem() {
        try {
            // Running Llama-3.2-1B locally via browser GPU for zero API limit capping constraints
            engine = await CreateMLCEngine("Llama-3.2-1B-Instruct-q4f16_1-MLC", {
                initProgressCallback: (report) => {
                    document.getElementById("status-text").innerText = report.text;
                    document.getElementById("progress-bar").style.width = `${Math.round(report.progress * 100)}%`;
                }
            });

            document.getElementById("status-text").innerText = "🔮 Engine Ready. Secure Sandbox Operational.";
            document.getElementById("chat-input").disabled = false;
            document.getElementById("chat-input").placeholder = "Message your Socratic coach...";
            document.getElementById("submit-btn").disabled = false;

            const stored = localStorage.getItem('local_tutor_history');
            if(stored) {
                conversationHistory = JSON.parse(stored);
                renderStoredInterface();
            } else {
                conversationHistory = [{ role: "system", content: BASE_INSTRUCTION }];
            }
        } catch (e) {
            document.getElementById("status-text").innerText = "❌ Initialization error. WebGPU activation requires a compatible browser like Chrome or Edge.";
            console.error(e);
        }
    }

    function renderStoredInterface() {
        const scroller = document.getElementById('chat-scroller');
        conversationHistory.forEach(msg => {
            if(msg.role !== 'system') {
                const bubbleClass = msg.role === 'user' ? 'user' : 'ai';
                scroller.innerHTML += `<div class="bubble ${bubbleClass}">${msg.content}</div>`;
            }
        });
        scroller.scrollTop = scroller.scrollHeight;
    }

    window.handleKeyPress = function(e) {
        if(e.key === 'Enter') sendChatMessage();
    }

    window.sendChatMessage = async function() {
        const inputField = document.getElementById('chat-input');
        const userText = inputField.value.trim();
        if(!userText) return;

        const scroller = document.getElementById('chat-scroller');
        scroller.innerHTML += `<div class="bubble user">${userText}</div>`;
        inputField.value = '';
        scroller.scrollTop = scroller.scrollHeight;

        const contextMaterial = document.getElementById('knowledge-data').value.trim();
        if(contextMaterial) {
            conversationHistory[0].content = `${BASE_INSTRUCTION}\n\nSTRICT CONTEXT FRAMEWORK:\n${contextMaterial}`;
        }

        conversationHistory.push({ role: "user", content: userText });

        const uniqueAiId = 'ai-' + Date.now();
        scroller.innerHTML += `<div class="bubble ai" id="${uniqueAiId}">Analyzing...</div>`;
        scroller.scrollTop = scroller.scrollHeight;

        const replyResult = await engine.chat.completions.create({ messages: conversationHistory });
        const aiResponseText = replyResult.choices[0].message.content;

        document.getElementById(uniqueAiId).innerText = aiResponseText;
        conversationHistory.push({ role: "assistant", content: aiResponseText });
        
        localStorage.setItem('local_tutor_history', JSON.stringify(conversationHistory));
        scroller.scrollTop = scroller.scrollHeight;
    }

    window.toggleWorkspace = function(panelId) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(panelId).classList.add('active');
        event.target.classList.add('active');
        if(panelId === 'board') renderCanvasGrid();
    }

    let appCanvas, sketchCtx, activeDrawState = false;
    function renderCanvasGrid() {
        appCanvas = document.getElementById("canvas");
        sketchCtx = appCanvas.getContext("2d");
        appCanvas.width = appCanvas.parentElement.clientWidth;
        appCanvas.height = appCanvas.parentElement.clientHeight - 80;
        sketchCtx.strokeStyle = "#1C1C1E"; /* Apple Dark Gray ink stroke */
        sketchCtx.lineWidth = 4;
        sketchCtx.lineCap = "round";

        appCanvas.onmousedown = () => activeDrawState = true;
        appCanvas.onmouseup = () => { activeDrawState = false; sketchCtx.beginPath(); };
        appCanvas.onmousemove = (event) => {
            if(!activeDrawState) return;
            const configurationBounds = appCanvas.getBoundingClientRect();
            sketchCtx.lineTo(event.clientX - configurationBounds.left, event.clientY - configurationBounds.top);
            sketchCtx.stroke();
            sketchCtx.beginPath();
            sketchCtx.moveTo(event.clientX - configurationBounds.left, event.clientY - configurationBounds.top);
        }
    }
    window.clearStudioCanvas = function() { sketchCtx.clearRect(0, 0, appCanvas.width, appCanvas.height); }

    initializeSystem();
</script>
</body>
</html>
