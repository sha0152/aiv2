<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Studio</title>
    <style>
        :root {
            --accent-blue: #0A84FF;
            --text-main: #FFFFFF;
            --text-muted: #8E8E93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0;
            padding: 24px;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            background-color: #000000;
            /* Ultra-premium iOS fluid gradient mesh background */
            background-image: 
                radial-gradient(at 0% 0%, hsla(240, 30%, 15%, 1) 0, transparent 60%),
                radial-gradient(at 50% 0%, hsla(225, 45%, 28%, 0.7) 0, transparent 70%),
                radial-gradient(at 100% 0%, hsla(290, 40%, 20%, 0.6) 0, transparent 60%),
                radial-gradient(at 100% 100%, hsla(220, 40%, 10%, 1) 0, transparent 100%),
                radial-gradient(at 0% 100%, hsla(255, 35%, 12%, 1) 0, transparent 100%);
            background-attachment: fixed;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
        }

        .brand h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 0;
            color: var(--text-main);
        }

        .app-layout {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 24px;
            flex-grow: 1;
            height: calc(100vh - 85px);
            min-height: 0;
        }

        /* Deep Frosted Glassmorphism Panels */
        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.5);
        }

        #chat-scroller {
            flex-grow: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .bubble {
            max-width: 75%;
            padding: 14px 20px;
            border-radius: 22px;
            line-height: 1.5;
            font-size: 16px;
            animation: iOSPop 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .bubble.user {
            background: var(--accent-blue);
            color: #FFFFFF;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 12px rgba(10, 132, 255, 0.3);
        }

        .bubble.ai {
            background: rgba(255, 255, 255, 0.11);
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* Typing Indicator dots */
        .typing-dots {
            display: flex;
            gap: 5px;
            align-items: center;
            height: 20px;
            padding: 4px 8px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            animation: dotPulse 1.4s infinite ease-in-out both;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        .input-bar {
            padding: 18px 24px;
            background: rgba(0, 0, 0, 0.25);
            display: flex;
            gap: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            align-items: center;
        }

        .input-bar input[type="text"] {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 14px 20px;
            border-radius: 24px;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            transition: background 0.2s;
        }

        .input-bar input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .send-btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 24px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        .send-btn:active {
            transform: scale(0.96);
        }

        .workspace-tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px;
            gap: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .tab {
            flex: 1;
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .tab.active {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .tab-panel {
            padding: 24px;
            flex-grow: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .tab-panel.active { display: flex; }

        textarea {
            width: 100%;
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            color: var(--text-main);
            padding: 18px;
            font-size: 15px;
            line-height: 1.6;
            resize: none;
            outline: none;
            box-sizing: border-box;
        }

        #canvas {
            background: #FFFFFF;
            border-radius: 20px;
            cursor: crosshair;
            flex-grow: 1;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Keyframe Animations */
        @keyframes iOSPop {
            from { opacity: 0; transform: scale(0.95) translateY(6px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <h1>Nexus Studio</h1>
    </div>
</header>

<div class="app-layout">
    <div class="glass-panel">
        <div id="chat-scroller">
            <div class="bubble ai">Hello. Tell me what you are working on, or paste your layout guidelines into the context box.</div>
        </div>
        <div class="input-bar">
            <input type="text" id="chat-input" placeholder="Message..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendChatMessage()">Send</button>
        </div>
    </div>

    <div class="glass-panel">
        <div class="workspace-tabs">
            <button class="tab active" onclick="toggleWorkspace('board')">Studio Canvas</button>
            <button class="tab" onclick="toggleWorkspace('materials')">Context Engine</button>
        </div>

        <div id="board" class="tab-panel active">
            <canvas id="canvas"></canvas>
            <div style="margin-top: 14px; display: flex; justify-content: flex-end;">
                <button onclick="clearStudioCanvas()" style="background: #FF453A; color: white; padding: 10px 20px; border-radius: 20px; border:none; cursor:pointer; font-weight:600; font-size:14px; box-shadow: 0 4px 12px rgba(255, 69, 58, 0.25);">Clear</button>
            </div>
        </div>

        <div id="materials" class="tab-panel">
            <textarea id="knowledge-data" placeholder="Paste assignments, study notes, or rubric constraints here..."></textarea>
        </div>
    </div>
</div>

<script>
    const SOCRATIC_PROMPT = `You are an elite, patient Socratic tutor. Never give direct solutions. Evaluate user input, isolate where structural knowledge fails, and ask ONE targeted guiding question to step them toward the answer. Keep replies brief.`;
    
    let conversationHistory = [];

    window.handleKeyPress = (e) => { if(e.key === 'Enter') sendChatMessage(); };

    async function sendChatMessage() {
        const inputField = document.getElementById('chat-input');
        const userText = inputField.value.trim();
        if(!userText) return;

        const scroller = document.getElementById('chat-scroller');
        scroller.innerHTML += `<div class="bubble user">${userText}</div>`;
        inputField.value = '';
        scroller.scrollTop = scroller.scrollHeight;

        const contextMaterial = document.getElementById('knowledge-data').value.trim();
        const finalSystemInstruction = contextMaterial ? `${SOCRATIC_PROMPT}\n\nSTRICT CONTEXT:\n${contextMaterial}` : SOCRATIC_PROMPT;

        // Append typing indicator bubble
        const aiBubbleId = 'ai-' + Date.now();
        scroller.innerHTML += `
            <div class="bubble ai" id="${aiBubbleId}">
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>`;
        scroller.scrollTop = scroller.scrollHeight;

        conversationHistory.push({ role: "user", content: userText });
        
        const payloadMessages = [
            { role: "system", content: finalSystemInstruction },
            ...conversationHistory.slice(-10)
        ];

        try {
            const res = await fetch("https://g4f.space/api/gemini/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    model: "gemini-2.5-flash",
                    messages: payloadMessages
                })
            });

            const data = await res.json();
            const reply = data.choices[0].message.content;

            // Swap out the typing dots with the actual response text
            document.getElementById(aiBubbleId).innerText = reply;
            conversationHistory.push({ role: "assistant", content: reply });
        } catch (err) {
            document.getElementById(aiBubbleId).innerText = "Connection lost. Please try again.";
            console.error(err);
        }
        scroller.scrollTop = scroller.scrollHeight;
    }

    window.toggleWorkspace = function(panelId) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(panelId).classList.add('active');
        event.target.classList.add('active');
    }

    let canvas, ctx, drawing = false;
    function initCanvas() {
        canvas = document.getElementById("canvas");
        ctx = canvas.getContext("2d");
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight - 90;
        ctx.strokeStyle = "#1C1C1E";
        ctx.lineWidth = 4;
        ctx.lineCap = "round";

        canvas.onmousedown = () => drawing = true;
        canvas.onmouseup = () => { drawing = false; ctx.beginPath(); };
        canvas.onmousemove = (e) => {
            if(!drawing) return;
            const bounds = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - bounds.left, e.clientY - bounds.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.clientX - bounds.left, e.clientY - bounds.top);
        }
    }
    window.clearStudioCanvas = () => ctx.clearRect(0, 0, canvas.width, canvas.height);

    setTimeout(initCanvas, 500);
</script>
</body>
</html>
