<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Socratic AI Tutor</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 700px; }
        #status-box { background: #1e1e1e; border: 1px solid #333; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: center; }
        #progress-bar { width: 0%; height: 8px; background: #4af; border-radius: 4px; transition: width 0.3s; margin-top: 10px; }
        #chat-box { width: 100%; height: 450px; border: 1px solid #333; overflow-y: auto; padding: 15px; background: #1a1a1a; border-radius: 8px; box-sizing: border-box; }
        .msg { margin-bottom: 15px; line-height: 1.5; }
        .user { color: #5cc2ff; }
        .ai { color: #a3ff6c; }
        .input-area { display: flex; margin-top: 15px; gap: 10px; }
        input { flex-grow: 1; padding: 12px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 6px; font-size: 16px; }
        button { padding: 12px 24px; background: #4af; color: #121212; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #555; cursor: not-allowed; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h2>🤖 Distributed Socratic Tutor (100% Free & Infinite)</h2>
    
    <div id="status-box">
        <span id="status-text">Initializing WebGPU Engine...</span>
        <div style="background: #333; border-radius: 4px; overflow: hidden;">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Loading AI model first..." disabled>
        <button id="send-btn" onclick="sendMessage()" disabled>Send</button>
    </div>
</div>

<script type="module">
    // Importing WebLLM directly from a public CDN
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

    const SYSTEM_PROMPT = `You are an elite, patient Socratic tutor. My goal is to truly learn, not just get answers. Never give me the direct solution to a problem or write an essay for me. Instead, look at what I give you, identify where my understanding breaks down, and ask me ONE guiding question at a time to help me figure it out myself. Keep responses concise.`;
    
    let engine;
    let chatHistory = [{ role: "system", content: SYSTEM_PROMPT }];

    // Initialize the AI engine directly inside the user's browser
    async function initAI() {
        const statusText = document.getElementById("status-text");
        const progressBar = document.getElementById("progress-bar");
        
        try {
            // Using Llama-3.2-1B, which is incredibly lightweight (~600MB-1GB) and fast for browser execution
            engine = await CreateMLCEngine("Llama-3.2-1B-Instruct-q4f16_1-MLC", {
                initProgressCallback: (report) => {
                    statusText.innerText = report.text;
                    progressBar.style.width = `${Math.round(report.progress * 100)}%`;
                }
            });
            
            statusText.innerText = "⚡ AI Model Ready! Ready to study.";
            document.getElementById("user-input").disabled = false;
            document.getElementById("user-input").placeholder = "Ask your Socratic coach anything...";
            document.getElementById("send-btn").disabled = false;
        } catch (error) {
            statusText.innerText = "❌ Initialization failed. Make sure your browser supports WebGPU (Chrome/Edge recommended).";
            console.error(error);
        }
    }

    // Handle messaging
    window.sendMessage = async function() {
        const inputEl = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const message = inputEl.value.trim();
        if (!message) return;

        // Display user message
        chatBox.innerHTML += `<div class="msg user"><b>You:</b> ${message}</div>`;
        inputEl.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        // Update history
        chatHistory.push({ role: "user", content: message });

        // Add a temporary loading thought placeholder
        const aiMessageId = "ai-" + Date.now();
        chatBox.innerHTML += `<div class="msg ai" id="${aiMessageId}"><b>Tutor:</b> Thinking...</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        // Generate response using local device GPU
        const reply = await engine.chat.completions.create({ messages: chatHistory });
        const replyText = reply.choices[0].message.content;

        // Display real answer and save to history
        document.getElementById(aiMessageId).innerHTML = `<b>Tutor:</b> ${replyText}`;
        chatHistory.push({ role: "assistant", content: replyText });
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Trigger loading on page display
    initAI();
</script>

</body>
</html>
